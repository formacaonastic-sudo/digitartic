<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo: Recurso digital desenvolvido por professor Mário Menezes</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #1E90FF, #87CEFA);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
  }

  #sideImage {
    position: absolute;
    left: 0;
    top: 50px;
    width: 250px;
    height: auto;
    border-radius: 10px;
    transition: transform 0.3s ease;
  }

  #sideImage.bounce {
    animation: bounce 0.6s;
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    25% { transform: translateY(-20px); }
    50% { transform: translateY(0); }
    75% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
  }

  h1 {
    color: #000000;
    font-size: 20px;
    text-align: center;
    margin-bottom: 40px;
  }

  .container {
    background-color: #ffffff;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.25);
    width: 90%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
  }

  /* Título maior e verde */
  #subTitle {
    font-size: 32px;           /* maior */
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
    color: #228B22;            /* verde vivo */
    opacity: 1;
    transition: opacity 0.3s, transform 0.3s;
  }

  .box-label {
    width: 80%;
    max-width: 700px;
    padding: 10px;
    font-size: 20px;
    text-align: left;
    font-weight: bold;
  }

  textarea {
    width: 80%;
    max-width: 700px;
    padding: 25px;
    font-size: 26px;
    border-radius: 20px;
    border: 3px solid #333;
    min-height: 140px;
    resize: vertical;
    box-shadow: 3px 3px 15px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background-color 0.2s;
    line-height: 1.8;
  }

  textarea:hover {
    transform: scale(1.03);
    box-shadow: 6px 6px 25px rgba(0,0,0,0.3);
  }

  textarea:focus {
    transform: scale(1.02);
    box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
    border-color: #FF8C00;
    background-color: #FFFACD;
  }

  #originalText {
    background-color: #E0FFFF;
    border: 4px solid #0D47A1;
    font-weight: bold;
    font-family: Arial, sans-serif;
  }

  #userInput {
    background-color: #ffffff;
    border: 4px solid #FF8C00;
    font-family: 'Verdana', sans-serif;
    font-size: 24px;
    line-height: 1.6;
  }

  .buttons {
    display: flex;
    gap: 20px;
  }

  .buttons button {
    font-size: 22px;
    padding: 12px 20px;
    border-radius: 15px;
    border: none;
    color: white;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .buttons button:hover {
    transform: scale(1.05);
  }

  #btnPrev { background-color: #2196F3; }
  #btnCheck { background-color: #4CAF50; }
  #btnNext { background-color: #FF9800; }

  .feedback {
    font-size: 24px;
    font-weight: bold;
    height: 40px;
    text-align: center;
  }

  .progress-bar-container {
    width: 80%;
    max-width: 700px;
    height: 25px;
    background-color: #ddd;
    border-radius: 15px;
    overflow: hidden;
    margin-top: 15px;
    position: relative;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4CAF50, #8BC34A);
    text-align: center;
    line-height: 25px;
    color: white;
    font-weight: bold;
    border-radius: 15px;
    transition: width 0.5s ease, background 0.5s ease;
  }

  #correctCounter {
    position: absolute;
    right: 10px;
    top: 0;
    font-size: 16px;
    font-weight: bold;
    line-height: 25px;
  }

  #medalContainer {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }

  #medalContainer span {
    display: inline-block;
    font-size: 28px;
    animation: pop 0.5s ease;
  }

  @keyframes pop {
    0% { transform: scale(0); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  #checkStamp {
    position: absolute;
    font-size: 120px;
    color: #4CAF50;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) rotate(-15deg);
    top: 50%;
    left: 50%;
    z-index: 10;
    transition: opacity 0.3s ease;
  }

  #developerCredit {
    text-align: center;
    font-weight: bold;
    color: #000;
    margin-top: 10px;
  }

  .glow {
    text-shadow: 0 0 10px gold, 0 0 20px gold;
  }
</style>
</head>
<body>

<img id="sideImage" src="https://png.pngtree.com/png-clipart/20230913/original/pngtree-typing-clipart-cartoon-boy-using-computer-in-glasses-vector-png-image_11074011.png" alt="Menino a usar computador">

<h1>RECURSO DIGITAL DESENVOLVIDO POR PROFESSOR MÁRIO MENEZES</h1>

<div class="container">
  <div id="subTitle">Pratica a digitação em TIC</div>

  <div class="box-label">Lê o texto:</div>
  <textarea id="originalText" readonly></textarea>

  <div class="box-label">Digita corretamente e ganha pontos:</div>
  <textarea id="userInput" autofocus></textarea>

  <div id="checkStamp">✔</div>

  <div class="buttons">
    <button id="btnPrev" onclick="previousText()">⬅ Anterior</button>
    <button id="btnCheck" onclick="checkCopy()">Verificar ✅</button>
    <button id="btnNext" onclick="nextText()">Seguinte ➡</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar">0%</div>
    <div id="correctCounter">Textos corretos: 0 / 12</div>
  </div>

  <div id="medalContainer"></div>

  <div id="developerCredit">Desenvolvido por Mário Menezes email: mario_menezes2009@edu.madeira.gov.pt</div>
</div>

<script>
const texts = [
  "O pai papa a Lula.\nA tia tapa o pote.\nÉ o tapete e o patito.",
  "O leão papa a lula.\nA Lili lê pela lupa.\nO pai tapou a lata.",
  "O dedo do pai dói.\nÉ dia de ditado.\nO dado é da tia Dália.",
  "A mãe é a mamã.\nEu amo a mãe.\nA mãe mima-me muito.\nEu amo o memé e o miau. O miau mia.",
  "O Tomé é o tio.\nA Tita é a tia.\nEu amo a tia e o tio.\nA tia mima a mãe pata e o patito.\nO tio apita a mota.",
  "É dia! O miau da Dalila mia muito.\nO dedo da pata dele dói, dói, dói.\nA Dalila dá leite ao miau.",
  "O Vitó vai à vila da avó Violeta.\nEla caiu e o Vitó levou-a ao médico da vila.\nO pé da Violeta dói muito!",
  "A tia ata o pacote.\nO pai da Cátia colou o copo.\nO pica-pau picou a capa da Cátia.",
  "O pica-pau picou a cauda da cadela.\nA Cátia põe a cadela ao colo. Coitada da cadelita!",
  "A Natália é neta do avô Nuno.\nNa mata cai muita neve. A Natália viu a neve.",
  "O Nuno vai no cavalo.\nA Natália deu o novelo à mãe.\nA avó dá uma nota à neta.",
  "O tio Nuno deu uma nota ao Nélito.\nA nota é nova. O Nélito vai à rua e leva a nota.\nÉ noite. Na rua cai muita neve."
];

let currentIndex = 0;
let correctCount = 0;
let answeredCorrectly = new Array(texts.length).fill(false);

function loadText(){
  const subTitle = document.getElementById('subTitle');
  subTitle.style.opacity = 0;
  subTitle.style.transform = "scale(0.8)";
  setTimeout(() => {
    subTitle.style.opacity = 1;
    subTitle.style.transform = "scale(1)";
  }, 100);

  document.getElementById('originalText').value = texts[currentIndex];
  document.getElementById('userInput').value = '';
  document.getElementById('userInput').disabled = false;
  document.getElementById('feedback').innerText = '';
  updateProgress();
}

function showCheckStamp(){
  const stamp = document.getElementById('checkStamp');
  stamp.style.opacity = 1;
  setTimeout(() => { stamp.style.opacity = 0; }, 1000);
}

function checkCopy(){
  const original = document.getElementById('originalText').value.trim();
  const userText = document.getElementById('userInput').value.trim();
  const feedback = document.getElementById('feedback');
  const sideImage = document.getElementById('sideImage');
  const medalContainer = document.getElementById('medalContainer');

  if(userText === ""){
    feedback.style.color = "red";
    feedback.innerText = "Digite algo antes de verificar!";
    return;
  }

  if(userText === original){
    feedback.style.color = "green";
    feedback.innerText = "Muito bem! ✅ 😃";

    sideImage.classList.add('bounce');
    setTimeout(() => { sideImage.classList.remove('bounce'); }, 600);

    showCheckStamp();

    if(!answeredCorrectly[currentIndex]){
      answeredCorrectly[currentIndex] = true;
      correctCount++;
      updateProgress();

      const medal = document.createElement('span');
      medal.innerText = "🏅";
      medal.classList.add('glow');
      medalContainer.appendChild(medal);
      setTimeout(() => medal.classList.remove('glow'), 1000);
    }

    setTimeout(() => { nextText(); }, 600);

  } else {
    feedback.style.color = "red";
    feedback.innerText = "Ops! ❌ Ainda não está correto, tente novamente!";
  }
}

function nextText(){
  if(currentIndex < texts.length -1){
    currentIndex++;
    loadText();
  } else {
    showEndGame();
  }
}

function previousText(){
  if(currentIndex > 0){
    currentIndex--;
    loadText();
  }
}

function updateProgress(){
  const progressBar = document.getElementById('progressBar');
  const correctCounter = document.getElementById('correctCounter');
  const percent = Math.round((correctCount / texts.length) * 100);
  progressBar.style.width = percent + "%";
  progressBar.style.background = `linear-gradient(to right, #4CAF50, #8BC34A ${percent}%, #ddd ${percent}%)`;
  progressBar.innerText = percent + "%";
  correctCounter.innerText = `Textos corretos: ${correctCount} / ${texts.length}`;
}

function showEndGame(){
  const feedback = document.getElementById('feedback');
  const medalContainer = document.getElementById('medalContainer');
  const userInput = document.getElementById('userInput');

  feedback.style.color = "gold";
  feedback.innerText = "🎉 Parabéns! Você completou todos os textos! 🎉";

  medalContainer.querySelectorAll('span').forEach((medal, i) => {
    medal.style.transition = "transform 0.3s, filter 0.3s";
    setTimeout(() => {
      medal.style.transform = "scale(1.5)";
      medal.style.filter = "drop-shadow(0 0 10px gold)";
    }, i * 200);
    setTimeout(() => {
      medal.style.transform = "scale(1)";
      medal.style.filter = "none";
    }, 600 + i * 200);
  });

  userInput.disabled = true;
}

loadText();
</script>
</body>
</html>
